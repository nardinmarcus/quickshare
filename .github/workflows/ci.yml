name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CI: "true"
      NODE_ENV: test
      VERCEL_ENV: ""
      DATABASE_URL: ""
      POSTGRES_URL: ""
      RUN_SCHEMA_INIT: "false"
      SESSION_SECRET: ci-only-not-a-production-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
