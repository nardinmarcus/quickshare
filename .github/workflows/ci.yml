name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: quickshare_test
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d quickshare_test"
          --health-interval 1s
          --health-timeout 3s
          --health-retries 30
    env:
      CI: "true"
      NODE_ENV: test
      VERCEL_ENV: ""
      DATABASE_URL: ""
      POSTGRES_URL: ""
      RUN_SCHEMA_INIT: "false"
      SESSION_SECRET: ci-only-not-a-production-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run PostgreSQL integration tests
        env:
          POSTGRES_TEST_URL: postgresql://postgres:postgres@127.0.0.1:5432/quickshare_test?sslmode=disable
        run: npm run test:postgres
