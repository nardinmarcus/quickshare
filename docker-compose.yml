version: '3.8'

services:
  quickshare:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quickshare
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      - NODE_ENV=production
      - PORT=8888
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - quickshare-network

networks:
  quickshare-network:
    driver: bridge
